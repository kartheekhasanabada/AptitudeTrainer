name: Build Android APK

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Build debug APK
        run: gradle assembleDebug

      - name: Rename APK
        run: |
          mkdir -p release
          cp app/build/outputs/apk/debug/app-debug.apk release/AptitudeTrainer.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AptitudeTrainer-APK
          path: release/AptitudeTrainer.apk
          if-no-files-found: error

      - name: Publish GitHub Release for version tags
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/AptitudeTrainer.apk
          name: Aptitude Trainer ${{ github.ref_name }}
          body: |
            ## Aptitude Trainer Android APK

            Download `AptitudeTrainer.apk` from the Assets section below and install it on Android.

            If Android blocks installation, enable **Install unknown apps** for your browser/file manager and try again.
          draft: false
          prerelease: false
